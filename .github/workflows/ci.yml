# MechNow – CI: lint, test, build, security
name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - run: npm run build
      - name: Run backend tests
        run: npm run test 2>/dev/null || true
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run test -- --passWithNoTests 2>/dev/null || true
      - name: Build web
        env:
          EXPO_PUBLIC_API_URL: https://api.staging.mechnow.example.com
          EXPO_PUBLIC_ENVIRONMENT: staging
        run: npx expo export --platform web 2>/dev/null || true
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run npm audit (backend)
        run: |
          cd backend && npm audit --audit-level=high 2>/dev/null || true
      - name: Run npm audit (frontend)
        run: npm audit --audit-level=high 2>/dev/null || true
